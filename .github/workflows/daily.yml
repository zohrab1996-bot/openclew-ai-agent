 name: OpenClew Daily Report
on:
  schedule:
    - cron: '0 4 * * *' # Bakı vaxtı ilə 08:00
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kodu kopyala
        uses: actions/checkout@v4

      - name: 2. Node.js 24 quraşdır
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 3. Kitabxanaları yüklə
        run: npm install

      - name: 4. Agent-i işə sal
        run: node index.mjs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
