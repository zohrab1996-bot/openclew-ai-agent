 name: OpenClew Daily Report
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: node index.mjs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
