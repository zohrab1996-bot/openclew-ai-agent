name: OpenClew Daily Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # Hər gün Bakı vaxtı ilə səhər 8:00 (UTC 4:00)

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu kopyala
        uses: actions/checkout@v4

      - name: Node quraşdır
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Kitabxanaları yüklə
        run: npm install

      - name: Agent-i işə sal
        run: node index.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
