name: OpenClew Daily Report
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu kopyala
        uses: actions/checkout@v3

      - name: Node.js quraşdır
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Kitabxanaları yüklə
        run: npm install

      - name: Agent-i işə sal
        run: node index.mjs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
